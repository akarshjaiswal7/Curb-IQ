# CurbIQ — builder + api split.
#
# `builder` runs the full pipeline (ETL -> analytics -> artifacts + model) once,
# writing into named volumes. `api` then serves those artifacts read-only.
# Both services share the same image (built from ./Dockerfile) and the same
# volumes, so the API picks up exactly what the builder produced.
#
#   # 1. put the raw BTP CSV on the host, then point the bind mount at it:
#   #    data/raw/police_violations.csv.gz   (default mount below)
#   # 2. build artifacts + bring the API up:
#   docker compose up --build
#   # -> builder runs to completion, api starts and depends on its success.
#   # open http://localhost:8000
#
#   # rebuild artifacts only (e.g. after new raw data):
#   docker compose run --rm builder
#
# Volumes: data/raw is a bind mount (host-supplied input); processed, artifacts
# and models are named volumes (generated output, shared builder -> api).

services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile
    image: curbiq:1.0.0
    command: ["python", "build_all.py"]
    volumes:
      - ./data/raw:/app/data/raw:ro          # input: raw gzipped CSV (read-only)
      - curbiq-processed:/app/data/processed  # output: cleaned parquet
      - curbiq-artifacts:/app/data/artifacts  # output: JSON artifacts
      - curbiq-models:/app/models             # output: LightGBM model
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: curbiq:1.0.0
    # default CMD (uvicorn) from the Dockerfile is used.
    ports:
      - "8000:8000"
    volumes:
      - curbiq-artifacts:/app/data/artifacts:ro  # serve what the builder wrote
      - curbiq-models:/app/models:ro
    depends_on:
      builder:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  curbiq-processed:
  curbiq-artifacts:
  curbiq-models:
